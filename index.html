<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cubo 3D Animato - Saluti</title>
  <meta name="description" content="Cubo 3D animato che si muove in aria e ruota su se stesso, con controlli Orbit e UI accessibile." />
  <link rel="icon" href="favicon.ico" sizes="any" />
  <link rel="stylesheet" href="css/style.css" />
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.155/build/three.module.js"
    }
  }
  </script>
</head>
<body>
  <main id="app" role="main" aria-label="Saluti 3D">
    <section class="overlay" aria-live="polite">
      <h1>Ciao, benvenuto nella scena 3D!</h1>
      <p>Il cubo si muove nello spazio e ruota su tutti e tre gli assi. Usa mouse/tocco per interagire.</p>
      <div class="controls" role="group" aria-label="Controlli scena">
        <button id="resetBtn" type="button">Reset cubo</button>
        <button id="toggleThemeBtn" type="button">Scuro/Chiaro</button>
        <button id="randomColorBtn" type="button">Colore casuale</button>
        <button id="toggleParticlesBtn" type="button">Particelle ON</button>
        <button id="pauseBtn" type="button">Pausa</button>
      </div>
      <div class="controls sliders" role="group" aria-label="Parametri particelle">
        <label>Conteggio particelle: <span id="countVal">80</span></label>
        <input id="particleCountSlider" type="range" min="0" max="300" value="80" />

        <label>Velocità particelle: <span id="speedVal">3.0</span></label>
        <input id="particleSpeedSlider" type="range" min="0.1" max="6" step="0.1" value="3.0" />

        <label>Restituzione (rimbalzo): <span id="restVal">0.9</span></label>
        <input id="restitutionSlider" type="range" min="0" max="1" step="0.01" value="0.9" />

        <button id="applyParticlesBtn" type="button">Applica parametri</button>
      </div>
      <p class="hint">Scroll/muovi con il mouse o dito: orbita, zoom e pan.</p>
    </section>
    <canvas id="scene" aria-label="Scena 3D" role="img"></canvas>
    <section id="debug" class="debug" aria-live="assertive"></section>
  </main>

  <script type="module" src="js/app.js"></script>
  <noscript>
    <div class="no-js-warning">JavaScript è richiesto per visualizzare la scena 3D.</div>
  </noscript>
</body>
</html>
