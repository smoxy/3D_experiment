<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cubo 3D Animato - Saluti</title>
  <meta name="description" content="Cubo 3D animato che si muove in aria e ruota su se stesso, con controlli Orbit e UI accessibile." />
  <link rel="icon" href="favicon.ico" sizes="any" />
  <link rel="stylesheet" href="css/style.css" />
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.155/build/three.module.js"
    }
  }
  </script>
</head>
<body>
  <main id="app" role="main" aria-label="Saluti 3D">
    <section class="overlay" aria-live="polite">
      <h1>Ciao, benvenuto nella scena 3D!</h1>
      <p>Il cubo si muove nello spazio e ruota su tutti e tre gli assi. Usa mouse/tocco per interagire.</p>
      <div class="controls" role="group" aria-label="Controlli scena">
        <button id="resetBtn" type="button">Reset cubo</button>
        <button id="toggleThemeBtn" type="button">Scuro/Chiaro</button>
        <button id="randomColorBtn" type="button">Colore casuale</button>
        <button id="toggleParticlesBtn" type="button">Particelle ON</button>
        <button id="pauseBtn" type="button">Pausa</button>
      </div>
      <div class="controls sliders" role="group" aria-label="Parametri particelle">
        <label>Conteggio particelle: <span id="countVal">80</span>
          <span class="info" data-tooltip="Numero di sfere nella scena. Più particelle = più collisioni e carico GPU.">i</span>
        </label>
        <input id="particleCountSlider" type="range" min="0" max="10000" value="80" />

        <label>Velocità iniziale: <span id="speedVal">3.0</span>
          <span class="info" data-tooltip="Modulo della velocità di spawn (u/s). Le particelle nascono con direzione casuale a questa velocità — maggiore velocità = traiettorie più ampie prima che la gravità le curvi verso il basso.">i</span>
        </label>
        <input id="particleSpeedSlider" type="range" min="0.1" max="6" step="0.1" value="3.0" />

        <label>Restituzione: <span id="restVal">0.9</span>
          <span class="info" data-tooltip="Coefficiente di restituzione elastica e (0–1). Determina la frazione di velocità conservata dopo ogni collisione: e=1 ⇒ urto perfettamente elastico (nessuna perdita di energia), e=0 ⇒ urto completamente anelastico (le particelle si fermano al contatto).">i</span>
        </label>
        <input id="restitutionSlider" type="range" min="0" max="1" step="0.01" value="0.9" />

        <label>Gravità: <span id="gravityVal">9.8</span>
          <span class="info" data-tooltip="Accelerazione gravitazionale verso il basso (m/s²). 9.8 = gravità terrestre, 0 = assenza di gravità (moto uniforme), 1.62 = Luna, 20 = ~2×g terrestre. Agisce come a = −g · ĵ nella seconda legge di Newton.">i</span>
        </label>
        <input id="gravitySlider" type="range" min="0" max="20" step="0.1" value="9.8" />

        <button id="applyParticlesBtn" type="button">Applica parametri</button>
      </div>
      <p class="hint">Scroll/muovi con il mouse o dito: orbita, zoom e pan.</p>
    </section>
    <canvas id="scene" aria-label="Scena 3D" role="img"></canvas>
    <section id="debug" class="debug" aria-live="assertive"></section>
  </main>

  <script type="module" src="js/app.js"></script>
  <noscript>
    <div class="no-js-warning">JavaScript è richiesto per visualizzare la scena 3D.</div>
  </noscript>
</body>
</html>
